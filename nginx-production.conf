# ============================================================
# Nginx - konfiguracja produkcyjna TherapyAssistance
# Plik: /etc/nginx/sites-available/therapyassistance
#
# Obsługuje dwie domeny na jednym serwerze mikr.us:
#   therapyassistance.io      -> frontend (pliki statyczne)
#   api.therapyassistance.io  -> backend  (proxy do uvicorn:8000)
#
# Po certbot (SSL) ten plik zostanie automatycznie zaktualizowany.
# ============================================================

# ── FRONTEND ─────────────────────────────────────────────────
server {
    listen 80;
    server_name therapyassistance.io www.therapyassistance.io;

    root /var/www/therapyassistance;
    index index.html;

    # React Router - wszystkie ścieżki obsługuje index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Pliki statyczne - agresywne cache'owanie
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Nagłówki bezpieczeństwa
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Kompresja
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    access_log /var/log/nginx/therapyassistance-frontend-access.log;
    error_log  /var/log/nginx/therapyassistance-frontend-error.log;
}

# ── BACKEND API ───────────────────────────────────────────────
server {
    listen 80;
    server_name api.therapyassistance.io;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    access_log /var/log/nginx/therapyassistance-api-access.log;
    error_log  /var/log/nginx/therapyassistance-api-error.log;
}
