# ============================================================
# Nginx - konfiguracja produkcyjna TherapyAssistance
# Plik: /etc/nginx/sites-available/therapyassistance
#
#   therapyassistance.io/      → React SPA (pliki statyczne)
#   therapyassistance.io/api/  → FastAPI (proxy do uvicorn:8000)
#   www.therapyassistance.io   → 301 → therapyassistance.io
# ============================================================

# ── Główny serwer (default_server = obsługuje też gołe IP) ────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name therapyassistance.io;

    root /var/www/therapyassistance;
    index index.html;

    # ── API proxy ─────────────────────────────────────────────
    # /api/patients  → localhost:8000/patients
    # /api/auth/...  → localhost:8000/auth/...
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Swagger UI / ReDoc / OpenAPI schema
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass         http://127.0.0.1:8000$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── React SPA ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Pliki statyczne – agresywne cache'owanie
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Nagłówki bezpieczeństwa
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Kompresja
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss image/svg+xml;

    access_log /var/log/nginx/therapyassistance-access.log;
    error_log  /var/log/nginx/therapyassistance-error.log;
}

# ── www → bez-www redirect ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name www.therapyassistance.io;
    return 301 http://therapyassistance.io$request_uri;
}
